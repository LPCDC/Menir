version: '3.8'

services:
  # 🧠 The Cortex (Ingestion & Logic)
  menir-runner:
    build: .
    container_name: menir-runner
    command: python -m src.v3.menir_runner
    restart: unless-stopped
    volumes:
      - ./Menir_Inbox:/app/Menir_Inbox # Hot Folder
      - ./logs:/app/logs # Audit Logs
      - ./src:/app/src # Live Code Reload (Dev Mode)
      - ./.env:/app/.env # Secrets
      - ./token.json:/app/token.json
      - ./tests:/app/tests # Tests for CI/CD
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      menir-init:
        condition: service_completed_successfully

  # 🔍 The Probe (Pre-Flight Check)
  menir-init:
    build: .
    container_name: menir-init
    command: python verify_docker.py
    volumes:
      - ./Menir_Inbox:/app/Menir_Inbox
      - ./.env:/app/.env
    restart: "no" # Run once and die
