version: '3.8'

services:
  # 🧠 The Cortex (Ingestion & Logic)
  menir-runner:
    build: .
    container_name: menir-runner
    command: bash scripts/entrypoint.sh
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "scripts/healthcheck.py" ]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./Menir_Inbox:/app/Menir_Inbox # Hot Folder (Writable)
      - ./logs:/app/logs # Audit Logs (Writable)
      - ./Menir_Archive:/app/Menir_Archive # Archive Dump (Writable)
      - ./src:/app/src:ro # Live Code Reload (Read-Only Guardrail)
      - ./.env:/app/.env:ro # Secrets (Read-Only)
      - ./token.json:/app/token.json:ro
      - ./tests:/app/tests:ro # Tests for CI/CD
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      menir-init:
        condition: service_completed_successfully

  # 🔍 The Probe (Pre-Flight Check)
  menir-init:
    build: .
    container_name: menir-init
    command: python verify_docker.py
    volumes:
      - ./Menir_Inbox:/app/Menir_Inbox
      - ./.env:/app/.env:ro
    restart: "no" # Run once and die
