version: '3.8'

services:
  menir_cortex:
    build: .
    container_name: menir_v5_2
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./Menir_Inbox:/app/Menir_Inbox
      - ./logs:/app/logs
    networks:
      - menir_macvlan
    ports:
      - "8080:8080"

networks:
  menir_macvlan:
    external: true
