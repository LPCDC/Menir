# ruff.toml
# Strict linter configuration for Menir Core V5

# Target Python version
target-version = "py311"

# Line length (allowing slightly longer for domain logic readability)
line-length = 100

[lint]
# Selected rule sets
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C90", # mccabe complexity
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "RUF"  # Ruff-specific rules
]

# Excluded rule sets / ignored rules
ignore = [
    "E501", # Line too long (handled by formatting if strictly needed, but let's allow some flexibility)
]

# Allow autofix for all enabled rules (when `--fix` is passed)
fixable = ["ALL"]
unfixable = []

# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]

[lint.mccabe]
# Flag errors (`C901`) whenever the complexity level exceeds 15.
# Enforces cognitive simplicity in Menir algorithms.
max-complexity = 15

[lint.isort]
known-first-party = ["src", "tests"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
