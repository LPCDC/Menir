[pytest]
# Configure pytest to run specific tests for MCP v10.3 feature
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Skip known failing tests unrelated to MCP proxy feature
addopts = 
    -v
    --tb=short
    --continue-on-collection-errors
    --ignore=tests/test_mcp_server.py
    --ignore=tests/test_memoetic.py
    --ignore=tests/test_menir10_boot.py
    --ignore=tests/test_menir10_daily_report.py
    --ignore=tests/test_menir10_export.py
    --ignore=tests/test_menir10_insights.py
    --ignore=tests/test_rag_agent.py
    --ignore=tests/test_rag_tools.py
    --ignore=tests/test_scribe.py
    --ignore=tests/test_scribe_e2e.py
    --ignore=tests/test_scribe_refinement.py

# Mark for conditional test execution
markers =
    mcp: tests for MCP proxy server
    boot: tests for boot module
    core: core functionality tests
